<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texas Penal Code Lookup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="window-bar" aria-label="Window bar">
        <div class="window-title"><img src="assets/logo.png" alt="Texas Penal Code Lookup" class="window-title-icon" onerror="this.style.display='none'" /><span>Texas Penal Code Lookup</span></div>
        <div class="window-controls" aria-label="Window controls">
          <button id="minimizeBtn" class="window-btn" aria-label="Minimize" title="Minimize">-</button>
          <button id="maximizeBtn" class="window-btn" aria-label="Maximize" title="Maximize">&#x2610;</button>
          <button id="closeBtn" class="window-btn close" aria-label="Close" title="Close">X</button>
        </div>
      </div>

      <header class="top-bar">
        <div class="brand">
          <img src="assets/logo.png" alt="Texas Penal Code Lookup" class="brand-mark" onerror="this.style.display='none'" />
          <h1 class="brand-title">Texas Penal Code Lookup</h1>
        </div>

        <div class="search-wrap">
          <input id="searchInput" type="text" placeholder="Search by code (e.g. 22.01) or description (e.g. ran from police)" autocomplete="off" />
          <button id="clearBtn" class="secondary">Clear</button>
        </div>
      </header>

      <section class="content-grid">
        <aside class="left-panel">
          <div class="panel-head">
            <h2>Results</h2>
            <span id="resultCount">0</span>
          </div>
          <div class="result-filters">
            <select id="resultFilter">
              <option value="all">All Results</option>
              <option value="code">Code Matches</option>
              <option value="text">Description Matches</option>
            </select>
          </div>
          <ul id="resultsList" class="results-list"></ul>
        </aside>

        <main class="right-panel">
          <div id="emptyState" class="empty-state">
            Select a Penal Code from results.
          </div>

          <article id="detailCard" class="detail-card hidden">
            <div class="detail-head">
              <div>
                <p id="codeNumber" class="code-number"></p>
                <h2 id="offenseTitle"></h2>
              </div>
              <button id="copyBtn">Copy</button>
            </div>

            <section>
              <h3>Legal Statute</h3>
              <p id="statuteText"></p>
              <a id="sourceLink" href="#" target="_blank" rel="noopener noreferrer">Open official source</a>
            </section>

            <section>
              <h3>Plain English</h3>
              <p id="plainEnglish"></p>
            </section>

            <p id="cacheStatus" class="cache-status"></p>
          </article>
        </main>
      </section>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
